[build]
  publish = "public"
  command = "mkdir -p public && cp -r landing/* public/"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS, DELETE"
    Access-Control-Allow-Headers = "Content-Type, Authorization, Mcp-Session-Id"
    Access-Control-Expose-Headers = "Mcp-Session-Id"

# Clean URLs for static pages
[[redirects]]
  from = "/aszf"
  to = "/aszf.html"
  status = 200

[[redirects]]
  from = "/adatkezeles"
  to = "/adatkezeles.html"
  status = 200

[[redirects]]
  from = "/setup"
  to = "/setup.html"
  status = 200

# Proxy MCP server requests to Hetzner
[[redirects]]
  from = "/.well-known/*"
  to = "http://49.12.196.186:4002/.well-known/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/register"
  to = "http://49.12.196.186:4002/register"
  status = 200
  force = true

[[redirects]]
  from = "/authorize"
  to = "http://49.12.196.186:4002/authorize"
  status = 200
  force = true

[[redirects]]
  from = "/token"
  to = "http://49.12.196.186:4002/token"
  status = 200
  force = true

[[redirects]]
  from = "/mcp"
  to = "http://49.12.196.186:4002/mcp"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "http://49.12.196.186:4002/health"
  status = 200
  force = true
